input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse the structured JSON log from logstash-logback-encoder
  if [service_name] {
    mutate {
      add_field => { "[@metadata][index_suffix]" => "%{service_name}" }
    }
  }

  # Parse timestamps
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Extract trace information into top-level fields for easy search
  if [mdc][traceId] {
    mutate {
      add_field => { "trace_id" => "%{[mdc][traceId]}" }
      add_field => { "span_id" => "%{[mdc][spanId]}" }
    }
  }

  if [mdc][userId] {
    mutate {
      add_field => { "user_id" => "%{[mdc][userId]}" }
    }
  }

  if [mdc][tenantId] {
    mutate {
      add_field => { "tenant_id" => "%{[mdc][tenantId]}" }
    }
  }

  # Remove redundant fields
  mutate {
    remove_field => ["host", "port"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "taskmaster-logs-%{+YYYY.MM.dd}"
    template_name => "taskmaster-logs"
  }

  # Also output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
