spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:http://config-server:8888"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # -----------------------------------------------------------------------
  # Spring Cloud Gateway
  # -----------------------------------------------------------------------
  cloud:
    gateway:
      # Forward the X-Forwarded-* headers from the original request
      forwarded:
        enabled: true
      x-forwarded:
        enabled: true
        for-enabled: true
        host-enabled: true
        port-enabled: true
        proto-enabled: true
      # Default filters applied to every route
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      # Timeouts
      httpclient:
        connect-timeout: 5000   # ms
        response-timeout: 30s

    # Service discovery via Eureka
    discovery:
      locator:
        enabled: true
        lower-case-service-id: true

  # -----------------------------------------------------------------------
  # Spring Boot Admin client
  # -----------------------------------------------------------------------
  boot:
    admin:
      client:
        url: ${ADMIN_SERVER_URL:http://admin-server:8090}
        instance:
          name: api-gateway
          service-url: ${GATEWAY_SERVICE_URL:http://api-gateway:8080}
          metadata:
            tags:
              environment: ${SPRING_PROFILES_ACTIVE:local}

# -----------------------------------------------------------------------
# Server
# -----------------------------------------------------------------------
server:
  port: 8080

# -----------------------------------------------------------------------
# Eureka
# -----------------------------------------------------------------------
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://service-registry:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# -----------------------------------------------------------------------
# Keycloak realm URIs — overridable via config-server or env vars
# -----------------------------------------------------------------------
keycloak:
  realms:
    admin:
      jwk-set-uri: ${KEYCLOAK_ADMIN_JWK_URI:http://keycloak:8180/realms/taskmaster-admin/protocol/openid-connect/certs}
      issuer-uri: ${KEYCLOAK_ADMIN_ISSUER_URI:http://keycloak:8180/realms/taskmaster-admin}
    app:
      jwk-set-uri: ${KEYCLOAK_APP_JWK_URI:http://keycloak:8180/realms/taskmaster-app/protocol/openid-connect/certs}
      issuer-uri: ${KEYCLOAK_APP_ISSUER_URI:http://keycloak:8180/realms/taskmaster-app}

# -----------------------------------------------------------------------
# Actuator
# -----------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway,loggers
  endpoint:
    health:
      show-details: when_authorized
    gateway:
      enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411/api/v2/spans}
  prometheus:
    metrics:
      export:
        enabled: true

# -----------------------------------------------------------------------
# Springdoc — reactive (WebFlux) mode
# -----------------------------------------------------------------------
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    # Each group maps to a /v3/api-docs/{service} route defined in GatewayRoutesConfig
    urls:
      - name: user-service
        url: /v3/api-docs/user-service
      - name: task-service
        url: /v3/api-docs/task-service
      - name: notification-service
        url: /v3/api-docs/notification-service
      - name: scheduler-service
        url: /v3/api-docs/scheduler-service
    display-request-duration: true
    groups-order: asc
    operations-sorter: method
    disable-swagger-default-url: true
  # Show actuator endpoints in the gateway's own docs
  show-actuator: true

# -----------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------
logging:
  level:
    root: INFO
    com.taskmaster: DEBUG
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{traceId}/%X{spanId}] - %msg%n"

logstash:
  host: ${LOGSTASH_HOST:logstash}
  port: ${LOGSTASH_PORT:5000}

---
# -----------------------------------------------------------------------
# Local profile — relaxed settings for local development
# -----------------------------------------------------------------------
spring:
  config:
    activate:
      on-profile: local

keycloak:
  realms:
    admin:
      jwk-set-uri: http://localhost:8180/realms/taskmaster-admin/protocol/openid-connect/certs
      issuer-uri: http://localhost:8180/realms/taskmaster-admin
    app:
      jwk-set-uri: http://localhost:8180/realms/taskmaster-app/protocol/openid-connect/certs
      issuer-uri: http://localhost:8180/realms/taskmaster-app

spring.boot.admin.client.url: http://localhost:8090
spring.boot.admin.client.instance.service-url: http://localhost:8080
