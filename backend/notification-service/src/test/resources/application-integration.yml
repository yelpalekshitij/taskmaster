spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/taskmaster_notifications
    username: test
    password: test
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cache:
    type: simple
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:1/realms/test

keycloak:
  realms:
    admin:
      issuer-uri: http://localhost:1/realms/test-admin
    app:
      issuer-uri: http://localhost:1/realms/test-app

eureka:
  client:
    enabled: false

spring-boot-admin:
  client:
    enabled: false

management:
  tracing:
    enabled: false
