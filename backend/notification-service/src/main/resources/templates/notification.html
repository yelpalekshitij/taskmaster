<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${subject}">TaskMaster Notification</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .header {
            background-color: #1976d2;
            padding: 24px 32px;
            color: #ffffff;
        }
        .header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .header p {
            margin: 4px 0 0;
            font-size: 13px;
            opacity: 0.85;
        }
        .body {
            padding: 32px;
        }
        .body h2 {
            margin: 0 0 12px;
            font-size: 18px;
            color: #212121;
        }
        .body p {
            margin: 0 0 16px;
            font-size: 15px;
            color: #555555;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }
        .badge-TASK_ASSIGNED { background-color: #e3f2fd; color: #1565c0; }
        .badge-TASK_UPDATED  { background-color: #e8f5e9; color: #2e7d32; }
        .badge-TASK_DUE      { background-color: #fff3e0; color: #e65100; }
        .badge-SYSTEM        { background-color: #f3e5f5; color: #6a1b9a; }
        .footer {
            background-color: #f9fafb;
            padding: 16px 32px;
            text-align: center;
            font-size: 12px;
            color: #9e9e9e;
            border-top: 1px solid #eeeeee;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>TaskMaster</h1>
        <p>Task management made simple</p>
    </div>
    <div class="body">
        <span class="badge" th:classappend="'badge-' + ${eventType}" th:text="${eventType}">EVENT</span>
        <h2 th:text="${subject}">Notification Subject</h2>
        <p th:text="${message}">Notification message content.</p>
        <p style="font-size:13px; color:#9e9e9e;">
            This is an automated notification from TaskMaster. Please do not reply to this email.
        </p>
    </div>
    <div class="footer">
        &copy; 2024 TaskMaster. All rights reserved.
    </div>
</div>
</body>
</html>
