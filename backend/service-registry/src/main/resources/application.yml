spring:
  application:
    name: service-registry
  security:
    user:
      name: eureka
      password: ${EUREKA_PASSWORD:eureka_secret}

server:
  port: 8761

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://eureka:${EUREKA_PASSWORD:eureka_secret}@localhost:8761/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: ${spring.application.name}
      version: ${spring.application.version:1.0.0}

logging:
  level:
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
