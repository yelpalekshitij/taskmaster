spring:
  application:
    name: task-service
  datasource:
    url: jdbc:postgresql://localhost:5432/taskmanager_tasks
    username: taskmaster
    password: taskmaster_secret
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cache:
    type: redis
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
  graphql:
    graphiql:
      enabled: true
    websocket:
      path: /graphql
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8180/realms/taskmaster-app

server:
  port: 8082

notification:
  service:
    url: http://notification-service

outbox:
  relay:
    interval-ms: 500
    batch-size: 50

springdoc:
  api-docs:
    path: /v3/api-docs
