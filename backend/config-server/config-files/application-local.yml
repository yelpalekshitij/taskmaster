# Local/Docker Compose overrides

eureka:
  client:
    service-url:
      defaultZone: http://eureka:eureka_secret@service-registry:8761/eureka/
  instance:
    # homePageUrl uses localhost so the link in SBA's Applications tab is clickable from the host browser.
    # management.url in metadata tells SBA to fetch actuator data via the Docker-internal hostname instead,
    # since the SBA container resolves service names over the Docker network, not localhost.
    homePageUrl: http://localhost:${server.port}/
    metadata-map:
      management.url: http://${spring.application.name}:${server.port}/actuator

spring:
  # Disable SBA direct-registration from services; Eureka discovery handles it
  boot:
    admin:
      client:
        enabled: false
  datasource:
    url: jdbc:postgresql://postgres:5432/${DB_NAME:taskmanager}
    username: taskmaster
    password: taskmaster_secret
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: redis
      port: 6379
      password: redis_secret
  kafka:
    bootstrap-servers: kafka:9092

zipkin:
  base-url: http://zipkin:9411

logging.level.root: INFO
logging.level.com.taskmaster: DEBUG