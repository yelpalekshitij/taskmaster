spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/taskmanager_users
    username: taskmaster
    password: taskmaster_secret
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cache:
    type: redis
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8180/realms/taskmaster-admin

server:
  port: 8081

# CHANGE (prod): use a dedicated service-account client (not admin-cli) with the minimum
# required permissions. Inject credentials via env vars — never commit real values.
keycloak:
  admin:
    server-url: ${KEYCLOAK_SERVER_URL:http://keycloak:8180}
    realm: master
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}  # CHANGE: env var in prod

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
