spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/taskmanager_users
    username: taskmaster
    password: taskmaster_secret
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cache:
    type: redis
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8180/realms/taskmaster-admin

server:
  port: 8081

keycloak:
  admin:
    server-url: http://keycloak:8180
    realm: master
    client-id: admin-cli
    username: admin
    password: admin

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
