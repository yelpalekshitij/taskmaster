server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/scheduler_db
    username: taskmaster
    password: taskmaster
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org.quartz.scheduler.instanceName: TaskMasterScheduler
      org.quartz.scheduler.instanceId: AUTO
      org.quartz.jobStore.driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
      org.quartz.jobStore.tablePrefix: QRTZ_
      org.quartz.jobStore.isClustered: false
      org.quartz.threadPool.threadCount: 5

keycloak:
  realms:
    admin:
      issuer-uri: http://localhost:8180/realms/taskmaster-admin
    app:
      issuer-uri: http://localhost:8180/realms/taskmaster-app

management:
  tracing:
    sampling:
      probability: 1.0
  prometheus:
    metrics:
      export:
        enabled: true

logstash:
  host: localhost
  port: 5000
