server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/scheduler_db
    username: taskmaster
    password: taskmaster
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org:
        quartz:
          scheduler:
            instanceName: TaskMasterScheduler
            instanceId: AUTO
          jobStore:
            class: org.quartz.impl.jdbcjobstore.JobStoreTX
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            tablePrefix: QRTZ_
            isClustered: false
          threadPool:
            threadCount: 5

keycloak:
  realms:
    admin:
      issuer-uri: http://localhost:8180/realms/taskmaster-admin
    app:
      issuer-uri: http://localhost:8180/realms/taskmaster-app

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

spring-boot-admin:
  client:
    url: http://localhost:8090
    instance:
      service-url: http://localhost:8084

logstash:
  host: localhost
  port: 5000
