spring:
  application:
    name: task-service
  config:
    import: "optional:configserver:http://config-server:8888"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5432/taskmaster_tasks
    username: taskmaster
    password: taskmaster
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

  graphql:
    graphiql:
      enabled: true
    path: /graphql

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8180/realms/taskmaster-app

keycloak:
  realms:
    admin:
      issuer-uri: http://keycloak:8180/realms/taskmaster-admin
    app:
      issuer-uri: http://keycloak:8180/realms/taskmaster-app

server:
  port: 8082

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  prometheus:
    metrics:
      export:
        enabled: true

outbox:
  relay:
    interval-ms: 500
    batch-size: 50

logging:
  level:
    com.taskmaster: DEBUG
    org.hibernate.SQL: WARN
