spring:
  application:
    name: spring-boot-admin-server
  config:
    import: optional:configserver:http://config-server:8888

server:
  port: 8090

spring.boot.admin:
  context-path: /admin
  discovery:
    # Exclude spring-boot-admin-server itself from the SBA instance list — it would always
    # show as DOWN because SBA resolves its own actuator URL via Eureka metadata
    # (Docker-internal hostname) which doesn't match how it reaches other services.
    ignored-services: spring-boot-admin-server

eureka:
  client:
    service-url:
      defaultZone: http://eureka:${EUREKA_PASSWORD:eureka_secret}@service-registry:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
